<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUILT Compass — FIELD</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="assets/built-core.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --green:#6dd441; --green-deep:#4ea52d;
    --bg:#0c0e0c; --bg-2:#101310;
    --card2:#171a17; --card3:#1d211d; --line:#2a2f2a; --line-2:#363c36;
    --text:#eef2ec; --muted:#8c948c; --muted-2:#5d645d;
    --amber:#ffb43d; --coral:#ff5a4d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Barlow',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .cond{font-family:'Barlow Condensed',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:11px;}
  ::-webkit-scrollbar-thumb{background:#2c322c;border:3px solid var(--bg);}

  /* header */
  .hdr{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    padding:13px 22px;background:rgba(12,14,12,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:30px;height:30px;background:var(--green);position:relative;flex:none;
    clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);}
  .mark::after{content:"";position:absolute;inset:8px;background:var(--bg);clip-path:polygon(0 0,100% 0,100% 60%,60% 100%,0 100%);}
  .brand b{font-family:'Barlow Condensed';font-weight:700;font-size:21px;letter-spacing:.05em;line-height:1;}
  .brand span{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.34em;color:var(--muted);display:block;margin-top:3px;}
  .helpbtn{display:flex;align-items:center;gap:8px;background:var(--coral);color:#fff;border:none;
    padding:9px 15px 8px;font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:.06em;
    text-transform:uppercase;box-shadow:0 4px 18px rgba(255,90,77,.32);}
  .helpbtn:hover{filter:brightness(1.08);}
  .helpbtn .pulse{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.8s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7);}70%{box-shadow:0 0 0 7px rgba(255,255,255,0);}100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}}

  /* map band */
  .mapband{position:relative;height:60vh;transition:height .6s cubic-bezier(.4,0,.1,1);overflow:hidden;
    border-bottom:1px solid var(--line);}
  .mapband.compact{height:140px;}
  #map{position:absolute;inset:0;z-index:1;background:var(--bg-2);}
  .leaflet-container{background:var(--bg-2);font-family:'JetBrains Mono',monospace;}
  .leaflet-control-attribution{background:rgba(12,14,12,.7)!important;color:#5d645d!important;font-size:9px;}
  .leaflet-control-attribution a{color:#8c948c!important;}

  .herocard{position:absolute;z-index:20;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(660px,92vw);text-align:center;transition:opacity .45s ease;}
  .herocard.gone{opacity:0;pointer-events:none;}
  .herocard::before{content:"";position:absolute;inset:-60px -120px;z-index:-1;
    background:radial-gradient(ellipse at center,rgba(12,14,12,.9),rgba(12,14,12,.55) 55%,transparent);}
  .kicker{font-family:'JetBrains Mono';font-size:12px;letter-spacing:.3em;color:var(--green);
    text-transform:uppercase;margin-bottom:16px;}
  .herocard h1{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;
    font-size:clamp(40px,7vw,82px);line-height:.92;letter-spacing:.01em;margin:0 0 12px;}
  .herocard h1 .g{color:var(--green);}
  .herocard p{color:var(--muted);max-width:520px;font-size:16px;line-height:1.5;margin:0 auto 26px;}

  .searchwrap{display:flex;width:100%;background:var(--card2);border:1px solid var(--line);
    box-shadow:0 24px 60px rgba(0,0,0,.6);height:62px;}
  .searchwrap input{flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-size:17px;padding:0 20px;font-family:'Barlow';}
  .searchwrap input::placeholder{color:var(--muted-2);}
  .searchwrap .go{background:var(--green);color:var(--bg);border:none;padding:0 28px;
    font-family:'Barlow Condensed';font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;}
  .searchwrap .go:hover{background:#7ee84d;}
  .searchwrap .go:disabled{opacity:.55;cursor:wait;}

  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px;}
  .chip{background:rgba(23,26,23,.8);border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;font-size:12.5px;font-family:'JetBrains Mono';letter-spacing:.02em;}
  .chip:hover{border-color:var(--green);color:var(--green);}

  /* compact banner */
  .bannertext{position:absolute;z-index:20;left:24px;top:50%;transform:translateY(-50%);
    opacity:0;transition:opacity .5s ease .15s;pointer-events:none;}
  .mapband.compact .bannertext{opacity:1;pointer-events:auto;}
  .bannertext .place{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:34px;
    line-height:1;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.7);}
  .bannertext .sub{font-family:'JetBrains Mono';font-size:11.5px;letter-spacing:.14em;color:var(--green);
    margin-top:8px;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.8);}
  .mapband.compact::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;z-index:11;
    background:repeating-linear-gradient(135deg,var(--green) 0 13px,var(--bg) 13px 26px);}
  .mapband.compact::after{content:"";position:absolute;inset:0;z-index:10;
    background:linear-gradient(90deg,rgba(8,10,8,.85),rgba(8,10,8,.2) 60%,transparent);}
  .banner-search{position:absolute;z-index:21;right:22px;top:50%;transform:translateY(-50%);
    display:flex;background:var(--card2);border:1px solid var(--line);padding:0;opacity:0;
    transition:opacity .5s ease .15s;height:44px;}
  .mapband.compact .banner-search{opacity:1;}
  .banner-search input{background:transparent;border:none;outline:none;padding:0 14px;font-size:14px;width:190px;
    color:var(--text);font-family:'Barlow';}
  .banner-search input::placeholder{color:var(--muted-2);}
  .banner-search button{background:var(--green);color:var(--bg);border:none;padding:0 16px;
    font-family:'Barlow Condensed';font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:15px;}

  /* dashboard */
  .dash{max-width:1240px;margin:0 auto;padding:30px 22px 80px;}
  .dashintro{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
  .dashintro h2{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:30px;
    margin:0;letter-spacing:.01em;}
  .grid{columns:3 330px;column-gap:18px;}
  .card{break-inside:avoid;background:var(--card2);border:1px solid var(--line);margin-bottom:18px;overflow:hidden;}
  .card.alert{border-color:rgba(255,180,61,.35);background:#191712;}
  .card-head{display:flex;align-items:center;gap:12px;padding:15px 16px 12px;border-bottom:1px solid var(--line);}
  .badge{width:38px;height:38px;flex:none;display:grid;place-items:center;background:var(--bg);
    border:1px solid var(--line-2);color:var(--green);font-family:'JetBrains Mono';font-weight:500;font-size:13px;}
  .card.alert .badge{color:var(--amber);border-color:rgba(255,180,61,.4);}
  .card-label{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:19px;
    letter-spacing:.03em;flex:1;line-height:1;}
  .card-headline{padding:12px 16px 4px;font-size:14.5px;line-height:1.5;color:var(--muted);}
  .card.alert .card-headline{color:#f0c987;}
  .items{padding:2px 16px 6px;}
  .row{padding:13px 0;border-top:1px solid var(--line);}
  .row:first-child{border-top:none;}
  .rtitle{font-weight:600;font-size:15.5px;line-height:1.3;color:var(--text);}
  .rdetail{font-size:14px;color:var(--muted);line-height:1.5;margin-top:4px;}
  .rfoot{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:11px;}
  .pill{font-family:'JetBrains Mono';font-size:10.5px;color:var(--green);letter-spacing:.04em;text-transform:uppercase;
    background:rgba(109,212,65,.1);border:1px solid rgba(109,212,65,.22);padding:5px 9px;line-height:1.2;}
  .card.alert .pill{color:var(--amber);border-color:rgba(255,180,61,.28);background:rgba(255,180,61,.08);}
  .act{display:inline-flex;align-items:center;gap:5px;font-family:'Barlow';font-size:13px;font-weight:600;
    text-decoration:none;padding:8px 13px;min-height:38px;border:1px solid var(--line-2);color:var(--text);background:var(--card3);}
  .act:hover{border-color:var(--green);color:var(--green);}
  .act.call{background:var(--green);color:var(--bg);border-color:var(--green);}
  .act.call:hover{filter:brightness(1.08);color:var(--bg);}
  .card-actions{display:flex;flex-wrap:wrap;gap:8px;padding:6px 16px 16px;}
  .card-actions a{display:inline-flex;align-items:center;gap:7px;font-family:'Barlow Condensed';font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;font-size:14.5px;text-decoration:none;padding:11px 15px;min-height:46px;
    background:rgba(109,212,65,.1);color:var(--green);border:1px solid rgba(109,212,65,.28);}
  .card-actions a::before{content:"\2192";opacity:.7;}
  .card-actions a:hover{background:var(--green);color:var(--bg);}
  .card.alert .card-actions a{color:var(--amber);background:rgba(255,180,61,.08);border-color:rgba(255,180,61,.28);}
  .card.alert .card-actions a:hover{background:var(--amber);color:var(--bg);}
  @keyframes rise{from{transform:translateY(12px);}to{transform:translateY(0);}}
  @media (prefers-reduced-motion: no-preference){ .row{animation:rise .45s ease both;} }
  .callout{margin:2px 16px 16px;padding:11px 13px;background:rgba(109,212,65,.08);border-left:3px solid var(--green);
    font-size:13px;line-height:1.5;color:#cfe9bd;}
  .card.alert .callout{background:rgba(255,180,61,.09);border-left-color:var(--amber);color:#f4d79b;}

  .skel{height:12px;background:linear-gradient(90deg,#1d211d,#2a2f2a,#1d211d);background-size:200% 100%;
    animation:sh 1.3s infinite;margin:9px 16px;}
  @keyframes sh{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .err{font-family:'JetBrains Mono';font-size:12px;color:var(--muted-2);padding:8px 16px 14px;}
  .spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--green);border-radius:50%;
    animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .disclaimer{margin-top:30px;text-align:center;font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted-2);
    line-height:1.7;max-width:600px;margin-left:auto;margin-right:auto;letter-spacing:.02em;}
  .progress{display:flex;align-items:center;gap:11px;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);
    letter-spacing:.1em;text-transform:uppercase;}
  .pbar{width:140px;height:6px;background:#22271f;overflow:hidden;}
  .pbar i{display:block;height:100%;background:var(--green);box-shadow:0 0 9px var(--green);
    transition:width .6s cubic-bezier(.4,0,.1,1);}

  /* crisis modal */
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(5,6,5,.8);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{width:min(440px,94vw);background:var(--card2);border:1px solid var(--line);border-top:4px solid var(--coral);
    box-shadow:0 30px 80px rgba(0,0,0,.7);}
  .modal h3{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:25px;margin:0;
    padding:20px 22px 4px;}
  .modal .ms{padding:0 22px 14px;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .crisisrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 22px;border-top:1px solid var(--line);}
  .crisisrow .cn{font-weight:600;font-size:14.5px;}
  .crisisrow .cnote{font-size:12px;color:var(--muted);margin-top:2px;}
  .crisisrow a{background:var(--green);color:var(--bg);text-decoration:none;font-family:'Barlow Condensed';
    font-weight:700;font-size:15px;padding:9px 15px;letter-spacing:.04em;white-space:nowrap;}
  .crisisrow a.txt{background:var(--card3);color:var(--green);border:1px solid var(--line);}
  .closex{float:right;background:none;border:none;color:var(--muted);font-size:23px;padding:15px 18px;line-height:1;}
  .closex:hover{color:var(--text);}

  .marker-dot{width:16px;height:16px;background:var(--green);border:3px solid var(--bg);border-radius:50%;
    box-shadow:0 0 0 2px var(--green),0 0 20px var(--green);position:relative;}
  .marker-dot::before,.marker-dot::after{content:"";position:absolute;left:50%;top:50%;width:16px;height:16px;
    border-radius:50%;border:2px solid var(--green);transform:translate(-50%,-50%);animation:radar 2.6s ease-out infinite;}
  .marker-dot::after{animation-delay:1.3s;}
  @keyframes radar{0%{width:16px;height:16px;opacity:.7;}100%{width:92px;height:92px;opacity:0;}}

  @media(max-width:560px){
    .mapband{height:64vh;}
    .herocard h1{font-size:clamp(34px,11vw,56px);}
    .banner-search{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Sector codes for the dark/industrial badges
const CODE = {
  hazards:"HZ", health:"ER", mental:"MH", recovery:"RX", childcare:"CC", schools:"ED",
  housing:"HM", groceries:"GR", furniture:"FT", recreation:"RC", community:"CM", cost:"$$"
};

// Open external links reliably (the embedded preview blocks plain _blank).
function openExt(e, url) {
  e.preventDefault();
  const w = window.open(url, "_blank", "noopener,noreferrer");
  if (!w) { try { window.location.assign(url); } catch (_) {} }
}

function CrisisModal({ onClose }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="closex" onClick={onClose}>×</button>
        <h3>You're not alone on this</h3>
        <p className="ms">If you or someone with you is struggling, reach out right now. Free, confidential, and built for people in the trades — any hour.</p>
        {BUILT.CRISIS.lines.map((l, i) => (
          <div className="crisisrow" key={i}>
            <div>
              <div className="cn">{l.name}</div>
              <div className="cnote">{l.note}</div>
            </div>
            {l.tel
              ? <a href={"tel:" + l.tel}>{l.num}</a>
              : <a className="txt" href="sms:741741?&body=HOME">{l.num}</a>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Card({ cat, data, place }) {
  const loading = data === "loading";
  const alert = cat.id === "hazards";
  const has = data && data !== "loading" && !data.error;
  const actions = has && place ? BUILT.categoryActions(cat.id, place) : [];
  return (
    <div className={"card" + (alert ? " alert" : "")}>
      <div className="card-head">
        <div className="badge mono">{CODE[cat.id] || "··"}</div>
        <div className="card-label">{cat.label}</div>
        {loading && <span className="spinner" />}
      </div>
      {loading && <><div className="skel" style={{width:"80%"}} /><div className="skel" style={{width:"55%"}} /><div style={{height:6}} /></>}
      {has && data.headline && <div className="card-headline">{data.headline}</div>}
      {has && data.items && data.items.length > 0 && (
        <div className="items">
          {data.items.map((it, i) => {
            const links = BUILT.itemLinks(it, place);
            return (
              <div className="row" key={i} style={{animationDelay:(i*70)+"ms"}}>
                <div className="rtitle">{it.title}</div>
                {it.detail && <div className="rdetail">{it.detail}</div>}
                {(it.meta || links.length > 0) && (
                  <div className="rfoot">
                    {it.meta && <span className="pill">{it.meta}</span>}
                    {links.map((l, j) => l.tel
                      ? <a className="act call" key={j} href={"tel:" + l.tel}>{l.label}</a>
                      : <a className="act" key={j} href={l.url} target="_blank" rel="noopener noreferrer" onClick={e => openExt(e, l.url)}>{l.label}</a>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {has && data.callout && <div className="callout">{data.callout}</div>}
      {has && actions.length > 0 && (
        <div className="card-actions">
          {actions.map((a, i) => a.tel
            ? <a key={i} href={"tel:" + a.tel}>{a.label}</a>
            : <a key={i} href={a.url} target="_blank" rel="noopener noreferrer" onClick={e => openExt(e, a.url)}>{a.label}</a>)}
        </div>
      )}
      {data && data.error && <div className="err">// couldn't load — try searching again</div>}
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [banner, setBanner] = useState("");
  const [place, setPlace] = useState(null);
  const [status, setStatus] = useState("idle");
  const [results, setResults] = useState({});
  const [crisis, setCrisis] = useState(false);
  const mapRef = useRef(null);
  const markerRef = useRef(null);
  const reqRef = useRef(0);

  useEffect(() => {
    const map = L.map("map", { zoomControl: false, attributionControl: true, scrollWheelZoom: false })
      .setView([39.5, -98.35], 4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19, subdomains: "abcd"
    }).addTo(map);
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => map.remove();
  }, []);

  const run = useCallback(async (q) => {
    if (!q || !q.trim()) return;
    const id = ++reqRef.current;
    setStatus("locating");
    const p = await BUILT.geocode(q.trim());
    if (id !== reqRef.current) return;
    if (!p) { setStatus("notfound"); return; }
    setPlace(p);
    setStatus("results");
    const seed = {};
    BUILT.CATEGORIES.forEach(c => seed[c.id] = "loading");
    setResults(seed);
    const map = mapRef.current;
    map.flyTo([p.lat, p.lng], 11, { duration: 1.4 });
    setTimeout(() => map.invalidateSize(), 650);
    if (markerRef.current) markerRef.current.remove();
    markerRef.current = L.marker([p.lat, p.lng], {
      icon: L.divIcon({ className: "", html: '<div class="marker-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] })
    }).addTo(map);
    window.scrollTo({ top: 0, behavior: "auto" });
    BUILT.lookupAll(p, {
      concurrency: 3,
      onResult: (cat, data) => {
        if (id !== reqRef.current) return;
        setResults(prev => ({ ...prev, [cat.id]: data }));
      }
    });
  }, []);

  const onSubmit = (e) => { e.preventDefault(); run(query); };
  const onBanner = (e) => { e.preventDefault(); if (banner.trim()) { setQuery(banner); run(banner); setBanner(""); } };

  const isResults = status === "results";
  const total = BUILT.CATEGORIES.length;
  const loaded = Object.values(results).filter(v => v && v !== "loading").length;

  return (
    <div>
      <div className="hdr">
        <div className="brand">
          <div className="mark"></div>
          <div>
            <b>BUILT COMPASS</b>
            <span>FIELD</span>
          </div>
        </div>
        <button className="helpbtn" onClick={() => setCrisis(true)}>
          <span className="pulse"></span> Get Help Now
        </button>
      </div>

      <div className={"mapband" + (isResults ? " compact" : "")}>
        <div id="map"></div>

        <div className={"herocard" + (isResults ? " gone" : "")}>
          <div className="kicker">Project BUILT · For workers &amp; families on the move</div>
          <h1>Know the ground<br/>before you <span className="g">land.</span></h1>
          <p>Type a ZIP, town, county, or address. We'll hand you the lay of the land — hazards, hospitals, housing, help, and how to plug in.</p>
          <form className="searchwrap" onSubmit={onSubmit}>
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Where are you headed?  (e.g. 58801 or Williston, ND)" />
            <button className="go" type="submit" disabled={status==="locating"}>
              {status === "locating" ? "Locating…" : "Scout It"}
            </button>
          </form>
          {status === "notfound" && <p style={{color:"var(--coral)",marginTop:14}}>Couldn't find that one. Try a ZIP or "Town, State".</p>}
          <div className="chips">
            {BUILT.QUICK.map(c => (
              <button className="chip" key={c.label} onClick={() => { setQuery(c.label); run(c.q); }}>{c.label}</button>
            ))}
          </div>
        </div>

        <div className="bannertext">
          <div className="place">{place ? place.label : ""}</div>
          <div className="sub">{place ? [place.county, place.zip].filter(Boolean).join(" · ") || place.state : ""}</div>
        </div>
        <form className="banner-search" onSubmit={onBanner}>
          <input value={banner} onChange={e => setBanner(e.target.value)} placeholder="Scout another place…" />
          <button type="submit">Go</button>
        </form>
      </div>

      {isResults && (
        <div className="dash">
          <div className="dashintro">
            <h2>Briefing · {place.city || place.label}</h2>
            <div className="progress">
              <div className="pbar"><i style={{width:(loaded/total*100)+"%"}}></i></div>
              <span>{loaded < total ? ("Scanning " + loaded + "/" + total) : (total + " sectors mapped")}</span>
            </div>
          </div>
          <div className="grid">
            {BUILT.CATEGORIES.map(cat => (
              <Card key={cat.id} cat={cat} data={results[cat.id]} place={place} />
            ))}
          </div>
          <div className="disclaimer">
            AI-built local briefing. Use it as a starting point and double-check the details that matter.
            In an emergency, call 911. Powered by Project BUILT.
          </div>
        </div>
      )}

      {crisis && <CrisisModal onClose={() => setCrisis(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
