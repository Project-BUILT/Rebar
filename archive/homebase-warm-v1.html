<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUILT Compass — HOMEBASE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="assets/built-core.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --green:#5fbf3a; --green-bright:#6dd441; --green-deep:#2f7d2e;
    --bg:#f6f3ec; --bg-2:#efeae0; --card:#fffdf8; --ink:#22241f; --ink-soft:#3d403a;
    --muted:#71756c; --line:#e3ddd0; --line-2:#d6cfbf;
    --amber:#c98a1f; --amber-bg:#fbf2dd; --coral:#d8553f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  .serif{font-family:'Newsreader',Georgia,serif;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:11px;}
  ::-webkit-scrollbar-thumb{background:#d6cfbf;border-radius:10px;border:3px solid var(--bg);}

  /* header */
  .hdr{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    padding:13px 22px;background:rgba(246,243,236,.88);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:30px;height:30px;background:var(--green);border-radius:9px 9px 9px 3px;position:relative;flex:none;}
  .mark::after{content:"";position:absolute;inset:8px;background:var(--bg);border-radius:5px 5px 5px 2px;}
  .brand b{font-family:'Newsreader';font-weight:600;font-size:20px;line-height:1;letter-spacing:-.01em;}
  .brand span{font-size:10px;letter-spacing:.26em;color:var(--muted);text-transform:uppercase;display:block;margin-top:3px;}
  .helpbtn{display:flex;align-items:center;gap:8px;background:var(--coral);color:#fff;border:none;
    padding:9px 16px;border-radius:40px;font-weight:600;font-size:14px;box-shadow:0 4px 16px rgba(216,85,63,.28);}
  .helpbtn:hover{filter:brightness(1.05);}
  .helpbtn .pulse{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.9s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7);}70%{box-shadow:0 0 0 7px rgba(255,255,255,0);}100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}}

  /* map band */
  .mapband{position:relative;height:60vh;transition:height .6s cubic-bezier(.4,0,.1,1);overflow:hidden;
    border-bottom:1px solid var(--line);}
  .mapband.compact{height:132px;}
  #map{position:absolute;inset:0;z-index:1;background:var(--bg-2);}
  .leaflet-control-attribution{background:rgba(255,253,248,.8)!important;font-size:9px;}

  .herocard{position:absolute;z-index:20;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(640px,92vw);text-align:center;transition:opacity .45s ease;}
  .herocard.gone{opacity:0;pointer-events:none;}
  .kicker{font-size:12px;letter-spacing:.22em;color:var(--green-deep);text-transform:uppercase;font-weight:600;
    margin-bottom:14px;}
  .herocard h1{font-family:'Newsreader';font-weight:500;font-size:clamp(34px,6vw,62px);line-height:1.02;
    letter-spacing:-.02em;margin:0 0 12px;color:var(--ink);}
  .herocard h1 em{font-style:italic;color:var(--green-deep);}
  .herocard p{color:var(--ink-soft);font-size:16.5px;line-height:1.5;max-width:480px;margin:0 auto 26px;}

  .searchwrap{display:flex;background:var(--card);border:1px solid var(--line-2);border-radius:16px;
    padding:7px 7px 7px 8px;box-shadow:0 18px 50px rgba(40,40,30,.16);}
  .searchwrap svg{align-self:center;margin:0 4px 0 8px;flex:none;}
  .searchwrap input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);
    font-size:17px;padding:12px 6px;font-family:'Hanken Grotesk';}
  .searchwrap input::placeholder{color:#a7a99f;}
  .searchwrap .go{background:var(--green);color:#fff;border:none;border-radius:11px;padding:0 24px;
    font-weight:700;font-size:15.5px;}
  .searchwrap .go:hover{background:var(--green-deep);}
  .searchwrap .go:disabled{opacity:.6;cursor:wait;}

  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;}
  .chip{background:rgba(255,253,248,.85);border:1px solid var(--line-2);color:var(--ink-soft);
    padding:7px 14px;border-radius:30px;font-size:13px;font-weight:500;}
  .chip:hover{border-color:var(--green);color:var(--green-deep);background:#fff;}

  /* compact banner content */
  .bannertext{position:absolute;z-index:20;left:24px;top:50%;transform:translateY(-50%);
    opacity:0;transition:opacity .5s ease .15s;pointer-events:none;}
  .mapband.compact .bannertext{opacity:1;pointer-events:auto;}
  .bannertext .place{font-family:'Newsreader';font-weight:600;font-size:30px;line-height:1;
    color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5);}
  .bannertext .sub{font-size:12.5px;letter-spacing:.08em;color:#fff;text-transform:uppercase;
    margin-top:6px;text-shadow:0 1px 8px rgba(0,0,0,.6);font-weight:600;}
  .mapband.compact::after{content:"";position:absolute;inset:0;z-index:10;
    background:linear-gradient(90deg,rgba(20,30,15,.7),rgba(20,30,15,.15) 60%,transparent);}
  .banner-search{position:absolute;z-index:21;right:22px;top:50%;transform:translateY(-50%);
    display:flex;background:rgba(255,253,248,.95);border-radius:11px;padding:5px;opacity:0;
    transition:opacity .5s ease .15s;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .mapband.compact .banner-search{opacity:1;}
  .banner-search input{background:transparent;border:none;outline:none;padding:8px 12px;font-size:14px;width:180px;font-family:'Hanken Grotesk';}
  .banner-search button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:0 14px;font-weight:600;}

  /* dashboard */
  .dash{max-width:1180px;margin:0 auto;padding:30px 22px 80px;}
  .dashintro{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;
    margin-bottom:22px;}
  .dashintro h2{font-family:'Newsreader';font-weight:500;font-size:27px;margin:0;letter-spacing:-.01em;}
  .dashintro .meta{font-size:13px;color:var(--muted);}
  .grid{columns:3 320px;column-gap:18px;}
  .card{break-inside:avoid;background:var(--card);border:1px solid var(--line);border-radius:16px;
    margin-bottom:18px;overflow:hidden;box-shadow:0 1px 0 rgba(40,40,30,.03),0 10px 30px rgba(40,40,30,.05);}
  .card.alert{background:var(--amber-bg);border-color:#ecd9a8;}
  .card-head{display:flex;align-items:center;gap:12px;padding:16px 18px 12px;}
  .badge{width:38px;height:38px;flex:none;border-radius:11px;display:grid;place-items:center;
    background:rgba(95,191,58,.13);color:var(--green-deep);font-weight:700;font-size:15px;
    font-family:'Newsreader';}
  .card.alert .badge{background:rgba(201,138,31,.16);color:var(--amber);}
  .card-label{font-family:'Newsreader';font-weight:600;font-size:19px;letter-spacing:-.01em;flex:1;}
  .card-headline{padding:0 18px 8px;font-size:14.5px;line-height:1.5;color:var(--ink-soft);font-weight:500;}
  .card.alert .card-headline{color:#8a5e16;}
  .items{padding:4px 18px 6px;}
  .row{padding:13px 0;border-top:1px solid var(--line);}
  .row:first-child{border-top:none;}
  .row .rtitle{font-weight:600;font-size:15.5px;line-height:1.3;}
  .row .rdetail{font-size:14px;color:var(--muted);line-height:1.5;margin-top:4px;}
  .row .rfoot{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:10px;}
  .pill{font-size:11px;color:var(--green-deep);font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;background:rgba(95,191,58,.12);padding:5px 10px;border-radius:20px;line-height:1.2;}
  .card.alert .pill{color:#8a5e16;background:rgba(201,138,31,.16);}
  .act{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;text-decoration:none;
    padding:8px 13px;border-radius:9px;border:1px solid var(--line-2);color:var(--ink);background:#fff;min-height:38px;}
  .act:hover{border-color:var(--green);color:var(--green-deep);}
  .act.call{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}
  .act.call:hover{filter:brightness(1.08);color:#fff;}
  .card-actions{display:flex;flex-wrap:wrap;gap:9px;padding:6px 18px 18px;}
  .card-actions a{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;text-decoration:none;
    padding:11px 16px;border-radius:30px;min-height:46px;background:rgba(95,191,58,.1);color:var(--green-deep);
    border:1px solid rgba(95,191,58,.2);}
  .card-actions a::before{content:"→";opacity:.6;font-weight:600;}
  .card-actions a:hover{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}
  .card.alert .card-actions a{background:rgba(201,138,31,.12);color:#8a5e16;border-color:rgba(201,138,31,.25);}
  .card.alert .card-actions a:hover{background:#8a5e16;color:#fff;}
  @keyframes rise{from{transform:translateY(12px);}to{transform:translateY(0);}}
  @media (prefers-reduced-motion: no-preference){ .row{animation:rise .45s ease both;} }
  .callout{margin:0 18px 16px;padding:11px 13px;background:rgba(95,191,58,.09);border-radius:10px;
    font-size:13px;line-height:1.5;color:var(--green-deep);display:flex;gap:9px;}
  .callout::before{content:"★";flex:none;}
  .card.alert .callout{background:rgba(201,138,31,.12);color:#8a5e16;}
  .card.alert .callout::before{content:"!";font-weight:700;}

  .skel{height:12px;border-radius:6px;background:linear-gradient(90deg,#efeae0,#f7f4ee,#efeae0);
    background-size:200% 100%;animation:sh 1.3s infinite;margin:8px 18px;}
  @keyframes sh{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .err{font-size:12.5px;color:var(--muted);padding:0 18px 14px;}
  .spinner{width:14px;height:14px;border:2px solid var(--line-2);border-top-color:var(--green);
    border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .disclaimer{margin-top:28px;text-align:center;font-size:12px;color:var(--muted);line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto;}
  .progress{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--muted);font-weight:500;}
  .pbar{width:130px;height:7px;border-radius:7px;background:var(--line);overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-bright));
    border-radius:7px;transition:width .6s cubic-bezier(.4,0,.1,1);box-shadow:0 0 10px rgba(95,191,58,.5);}

  /* crisis modal */
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(34,36,31,.5);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{width:min(440px,94vw);background:var(--card);border-radius:20px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.4);border-top:5px solid var(--coral);}
  .modal h3{font-family:'Newsreader';font-weight:600;font-size:25px;margin:0;padding:22px 24px 4px;}
  .modal .ms{padding:0 24px 16px;color:var(--ink-soft);font-size:14.5px;line-height:1.5;}
  .crisisrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid var(--line);}
  .crisisrow .cn{font-weight:600;font-size:15px;}
  .crisisrow .cnote{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .crisisrow a{background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:14.5px;
    padding:9px 16px;border-radius:30px;white-space:nowrap;}
  .crisisrow a.txt{background:rgba(95,191,58,.13);color:var(--green-deep);}
  .closex{float:right;background:none;border:none;color:var(--muted);font-size:24px;padding:16px 20px;line-height:1;}
  .closex:hover{color:var(--ink);}

  .marker-pin{width:18px;height:18px;background:var(--green-bright);border:3px solid #fff;border-radius:50%;
    box-shadow:0 2px 12px rgba(0,0,0,.4);position:relative;}
  .marker-pin::before,.marker-pin::after{content:"";position:absolute;left:50%;top:50%;width:18px;height:18px;
    border-radius:50%;border:2px solid var(--green-bright);transform:translate(-50%,-50%);
    animation:radar 2.6s ease-out infinite;}
  .marker-pin::after{animation-delay:1.3s;}
  @keyframes radar{0%{width:18px;height:18px;opacity:.7;}100%{width:84px;height:84px;opacity:0;}}

  @media(max-width:560px){
    .mapband{height:64vh;}
    .herocard h1{font-size:clamp(30px,9vw,46px);}
    .banner-search{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function SearchIcon(){
  return (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9a9c92" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>);
}

function CrisisModal({ onClose }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="closex" onClick={onClose}>×</button>
        <h3>You're not alone in this</h3>
        <p className="ms">If you or someone with you is struggling, reach out right now. Free, confidential, and there for people in the trades — any hour.</p>
        {BUILT.CRISIS.lines.map((l, i) => (
          <div className="crisisrow" key={i}>
            <div>
              <div className="cn">{l.name}</div>
              <div className="cnote">{l.note}</div>
            </div>
            {l.tel
              ? <a href={"tel:" + l.tel}>{l.num}</a>
              : <a className="txt" href="sms:741741?&body=HOME">{l.num}</a>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Card({ cat, data, place }) {
  const loading = data === "loading";
  const alert = cat.id === "hazards";
  const has = data && data !== "loading" && !data.error;
  const actions = has && place ? BUILT.categoryActions(cat.id, place) : [];
  return (
    <div className={"card" + (alert ? " alert" : "")}>
      <div className="card-head">
        <div className="badge serif">{cat.glyph}</div>
        <div className="card-label">{cat.label}</div>
        {loading && <span className="spinner" />}
      </div>
      {loading && <><div className="skel" style={{width:"80%"}} /><div className="skel" style={{width:"55%"}} /><div style={{height:6}} /></>}
      {has && data.headline && <div className="card-headline">{data.headline}</div>}
      {has && data.items && data.items.length > 0 && (
        <div className="items">
          {data.items.map((it, i) => {
            const links = BUILT.itemLinks(it, place);
            return (
              <div className="row" key={i} style={{animationDelay:(i*70)+"ms"}}>
                <div className="rtitle">{it.title}</div>
                {it.detail && <div className="rdetail">{it.detail}</div>}
                {(it.meta || links.length > 0) && (
                  <div className="rfoot">
                    {it.meta && <span className="pill">{it.meta}</span>}
                    {links.map((l, j) => l.tel
                      ? <a className="act call" key={j} href={"tel:" + l.tel}>{l.label}</a>
                      : <a className="act" key={j} href={l.url} target="_blank" rel="noopener">{l.label}</a>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {has && data.callout && <div className="callout">{data.callout}</div>}
      {has && actions.length > 0 && (
        <div className="card-actions">
          {actions.map((a, i) => a.tel
            ? <a key={i} href={"tel:" + a.tel}>{a.label}</a>
            : <a key={i} href={a.url} target="_blank" rel="noopener">{a.label}</a>)}
        </div>
      )}
      {data && data.error && <div className="err">Couldn't load this one — try searching again.</div>}
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [banner, setBanner] = useState("");
  const [place, setPlace] = useState(null);
  const [status, setStatus] = useState("idle");
  const [results, setResults] = useState({});
  const [crisis, setCrisis] = useState(false);
  const mapRef = useRef(null);
  const markerRef = useRef(null);
  const reqRef = useRef(0);

  useEffect(() => {
    const map = L.map("map", { zoomControl: false, attributionControl: true, scrollWheelZoom: false })
      .setView([39.5, -98.35], 4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19, subdomains: "abcd"
    }).addTo(map);
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => map.remove();
  }, []);

  const run = useCallback(async (q) => {
    if (!q || !q.trim()) return;
    const id = ++reqRef.current;
    setStatus("locating");
    const p = await BUILT.geocode(q.trim());
    if (id !== reqRef.current) return;
    if (!p) { setStatus("notfound"); return; }
    setPlace(p);
    setStatus("results");
    const seed = {};
    BUILT.CATEGORIES.forEach(c => seed[c.id] = "loading");
    setResults(seed);
    const map = mapRef.current;
    map.flyTo([p.lat, p.lng], 11, { duration: 1.4 });
    setTimeout(() => map.invalidateSize(), 650);
    if (markerRef.current) markerRef.current.remove();
    markerRef.current = L.marker([p.lat, p.lng], {
      icon: L.divIcon({ className: "", html: '<div class="marker-pin"></div>', iconSize: [20,20], iconAnchor: [10,10] })
    }).addTo(map);
    window.scrollTo({ top: 0, behavior: "auto" });
    BUILT.lookupAll(p, {
      concurrency: 3,
      onResult: (cat, data) => {
        if (id !== reqRef.current) return;
        setResults(prev => ({ ...prev, [cat.id]: data }));
      }
    });
  }, []);

  const onSubmit = (e) => { e.preventDefault(); run(query); };
  const onBanner = (e) => { e.preventDefault(); if (banner.trim()) { setQuery(banner); run(banner); setBanner(""); } };

  const isResults = status === "results";
  const loaded = place && Object.values(results).filter(v => v && v !== "loading").length;

  return (
    <div>
      <div className="hdr">
        <div className="brand">
          <div className="mark"></div>
          <div>
            <b>BUILT Compass</b>
            <span>Homebase</span>
          </div>
        </div>
        <button className="helpbtn" onClick={() => setCrisis(true)}>
          <span className="pulse"></span> Need help now?
        </button>
      </div>

      <div className={"mapband" + (isResults ? " compact" : "")}>
        <div id="map"></div>

        <div className={"herocard" + (isResults ? " gone" : "")}>
          <div className="kicker">Project BUILT · Land softer, settle faster</div>
          <h1>Wherever the work takes you, <em>arrive knowing.</em></h1>
          <p>Tell us where you're headed. We'll gather what your family needs to feel at home — the help, the hazards, the everyday stuff.</p>
          <form className="searchwrap" onSubmit={onSubmit}>
            <SearchIcon />
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Enter a ZIP, town, county, or address" />
            <button className="go" type="submit" disabled={status==="locating"}>
              {status === "locating" ? "Looking…" : "Explore"}
            </button>
          </form>
          {status === "notfound" && <p style={{color:"var(--coral)",marginTop:14}}>Hmm, couldn't find that. Try a ZIP or "Town, State".</p>}
          <div className="chips">
            {BUILT.QUICK.map(c => (
              <button className="chip" key={c.label} onClick={() => { setQuery(c.label); run(c.q); }}>{c.label}</button>
            ))}
          </div>
        </div>

        <div className="bannertext">
          <div className="place serif">{place ? place.label : ""}</div>
          <div className="sub">{place ? [place.county, place.zip].filter(Boolean).join(" · ") || place.state : ""}</div>
        </div>
        <form className="banner-search" onSubmit={onBanner}>
          <input value={banner} onChange={e => setBanner(e.target.value)} placeholder="Try another place…" />
          <button type="submit">Go</button>
        </form>
      </div>

      {isResults && (
        <div className="dash">
          <div className="dashintro">
            <h2>Your briefing for {place.city || place.label}</h2>
            <div className="progress">
              <div className="pbar"><i style={{width:(loaded/BUILT.CATEGORIES.length*100)+"%"}}></i></div>
              <span>{loaded < BUILT.CATEGORIES.length ? ("Gathering " + loaded + "/" + BUILT.CATEGORIES.length + "…") : ("All " + BUILT.CATEGORIES.length + " ready")}</span>
            </div>
          </div>
          <div className="grid">
            {BUILT.CATEGORIES.map(cat => (
              <Card key={cat.id} cat={cat} data={results[cat.id]} place={place} />
            ))}
          </div>
          <div className="disclaimer">
            This is an AI-gathered local briefing — a strong starting point, not the last word. Verify the specifics that matter, and call 911 in an emergency. Made with care by Project BUILT.
          </div>
        </div>
      )}

      {crisis && <CrisisModal onClose={() => setCrisis(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
